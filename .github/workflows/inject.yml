name: Rebuild index.html

on:
  push:
    paths:
      - productos.json
    branches:
      - main

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild index.html
        run: python inject_data.py

      - name: Commit index.html
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rebuild index.html [skip ci]"
          file_pattern: index.html
