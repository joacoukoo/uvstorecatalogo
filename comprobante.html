<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Comprobante — UV Store GT</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#07080d;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px;
  gap:14px;
  font-family:'Montserrat',sans-serif;
}
#preview {
  width:100%;
  max-width:480px;
  display:block;
  border-radius:4px;
}
.btn {
  width:100%; max-width:480px;
  padding:14px;
  border:none; border-radius:10px;
  font-size:16px; font-weight:700;
  font-family:inherit; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-wa  { background:#25D366; color:#fff; }
.btn-dl  { background:#2a2b3d; color:#ccc; font-size:14px; padding:10px; }
.btn:disabled { opacity:.55; cursor:default; }
#estado  { color:var(--muted2,#666); font-size:13px; }
</style>
</head>
<body>

<canvas id="preview"></canvas>
<p id="estado">Generando comprobante...</p>
<button class="btn btn-wa"  id="btn-wa"  onclick="compartir()" disabled>📤 Compartir por WhatsApp</button>
<button class="btn btn-dl"  id="btn-dl"  onclick="descargar()" disabled>⬇ Descargar imagen</button>

<script>
const q = new URLSearchParams(location.search);
const tipo     = q.get('tipo')     || 'abono';
const nombre   = q.get('nombre')   || '';
const figura   = q.get('figura')   || '';
const monto    = parseFloat(q.get('monto'))    || 0;
const total    = parseFloat(q.get('total'))    || 0;
const abonado  = parseFloat(q.get('abonado'))  || 0;
const restante = parseFloat(q.get('restante')) || 0;

function fmtQ(v) {
  return 'Q' + (v || 0).toLocaleString('es-GT', { minimumFractionDigits:0, maximumFractionDigits:2 });
}

// ─── Canvas 1200×1600 ─────────────────────────────────────────
const W = 1200, H = 1600;
let _blob = null;

async function render() {
  await document.fonts.load('800 68px Montserrat');
  await document.fonts.load('700 42px Montserrat');
  await document.fonts.load('italic 700 38px Montserrat');

  const offscreen = document.createElement('canvas');
  offscreen.width = W; offscreen.height = H;
  const ctx = offscreen.getContext('2d');

  // fondo
  const bgSrc = tipo === 'reserva'
    ? 'assets/comprobante-reserva-bg.png'
    : 'assets/comprobante-abono-bg.png';
  const img = await loadImage(bgSrc);
  ctx.drawImage(img, 0, 0, W, H);

  // helper: texto centrado
  function txt(text, x, y, size, color, style = 'bold') {
    ctx.save();
    ctx.font = style + ' ' + size + 'px Montserrat, sans-serif';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // wrap si es muy largo
    const maxW = 1000;
    if (ctx.measureText(text).width > maxW) {
      ctx.font = style + ' ' + Math.round(size * 0.75) + 'px Montserrat, sans-serif';
    }
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  // ── posiciones en px (canvas 1200×1600) ──────────────────────
  //   Ajustar aquí si algo queda corrido
  const CX = 600; // centro horizontal

  if (tipo === 'abono') {
    txt(nombre,       CX,  290, 68, '#ffffff', '800');
    txt(fmtQ(monto),  CX,  422, 44, '#ffffff', '700');
    txt(figura,       CX,  590, 36, '#E8A020', 'italic 700');
    // tabla derecha: centro x ≈ 810
    txt(fmtQ(total),    810, 800,  54, '#111111', '800');
    txt(fmtQ(abonado),  810, 910,  54, '#111111', '800');
    txt(fmtQ(restante), 810, 1018, 54, '#111111', '800');
  } else {
    txt(nombre,       CX,  295, 68, '#ffffff', '800');
    txt(fmtQ(monto),  CX,  425, 44, '#ffffff', '700');
    txt(figura,       CX,  565, 36, '#E8A020', 'italic 700');
    // tabla derecha (2 filas)
    txt(fmtQ(total),    810, 860, 54, '#111111', '800');
    txt(fmtQ(restante), 810, 975, 54, '#111111', '800');
  }

  // preview escalado
  const preview = document.getElementById('preview');
  preview.width  = W;
  preview.height = H;
  preview.getContext('2d').drawImage(offscreen, 0, 0);

  // blob para compartir
  _blob = await new Promise(res => offscreen.toBlob(res, 'image/jpeg', 0.93));

  document.getElementById('estado').textContent = '';
  document.getElementById('btn-wa').disabled = false;
  document.getElementById('btn-dl').disabled = false;
}

function loadImage(src) {
  return new Promise((res, rej) => {
    const i = new Image();
    i.crossOrigin = 'anonymous';
    i.onload  = () => res(i);
    i.onerror = rej;
    i.src = src;
  });
}

async function compartir() {
  if (!_blob) return;
  const fname = 'comprobante-' + (nombre || 'uv').replace(/\s+/g, '-') + '.jpg';
  const file  = new File([_blob], fname, { type:'image/jpeg' });
  if (navigator.canShare && navigator.canShare({ files:[file] })) {
    await navigator.share({ files:[file], title:'Comprobante UV Store GT' });
  } else {
    _dl(fname);
  }
}

function descargar() {
  if (!_blob) return;
  _dl('comprobante-' + (nombre || 'uv').replace(/\s+/g,'-') + '.jpg');
}

function _dl(fname) {
  const url = URL.createObjectURL(_blob);
  Object.assign(document.createElement('a'), { href:url, download:fname }).click();
  URL.revokeObjectURL(url);
}

render().catch(e => {
  document.getElementById('estado').textContent = 'Error: ' + e.message;
});
</script>
</body>
</html>
